<!DOCTYPE html>
<html lang="id" class="h-full">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Riwayat Transaksi - DamaraSkin</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/module.esm.js"></script>
  <script type="module" crossorigin src="/assets/compiled-KLbNheu3.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/compiled-DXAZJh9h.css">
</head>
<body class="font-poppins antialiased bg-[#FAF7F6] text-dark-text min-h-screen flex flex-col selection:bg-primary/20 selection:text-primary">
    <!-- Navbar Container -->
    <div id="navbar-container"></div>

    <!-- Page Header Banner -->
    <div class="bg-gradient-to-r from-[#FFF6F6] via-[#FFF1F3] to-[#FFF9FA] border-b border-primary/5 py-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight leading-none">Riwayat Transaksi</h1>
            <p class="text-sm text-gray-500 mt-2">Daftar riwayat transaksi belanja skincare yang pernah Anda lakukan di DamaraSkin.</p>
        </div>
    </div>

    <!-- Main Content Area -->
    <main class="py-12 bg-white" x-data="ordersPage()">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

            <div x-show="orders.length === 0" class="text-center py-16 bg-[#FFF9FA] rounded-3xl border border-primary/5 max-w-xl mx-auto" x-cloak>
                <svg class="mx-auto h-12 w-12 text-gray-400 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                </svg>
                <h2 class="text-xl font-bold text-gray-800">Belum Ada Transaksi</h2>
                <p class="mt-2 text-sm text-gray-505">Anda belum melakukan pemesanan produk skincare apa pun.</p>
                <div class="mt-8">
                    <a href="/products.html" class="inline-flex items-center px-8 py-3.5 bg-gradient-to-r from-primary to-accent hover:from-accent hover:to-primary text-white font-bold rounded-2xl text-sm transition duration-300 shadow-lg shadow-primary/20">
                        Belanja Sekarang
                    </a>
                </div>
            </div>

            <div x-show="orders.length > 0" class="overflow-hidden" x-cloak>
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-100">
                        <thead>
                            <tr>
                                <th class="px-6 py-4 text-left text-xs font-bold text-gray-400 uppercase tracking-wider">Tanggal</th>
                                <th class="px-6 py-4 text-left text-xs font-bold text-gray-400 uppercase tracking-wider">Nomor Pesanan</th>
                                <th class="px-6 py-4 text-left text-xs font-bold text-gray-400 uppercase tracking-wider">Total Harga</th>
                                <th class="px-6 py-4 text-left text-xs font-bold text-gray-400 uppercase tracking-wider">Pembayaran</th>
                                <th class="px-6 py-4 text-left text-xs font-bold text-gray-400 uppercase tracking-wider">Status Pesanan</th>
                                <th class="px-6 py-4 text-right text-xs font-bold text-gray-400 uppercase tracking-wider">Aksi</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-150">
                            <template x-for="order in orders" :key="order.id">
                                <tr class="hover:bg-gray-55/50 transition">
                                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 font-medium" x-text="new Date(order.created_at).toLocaleDateString('id-ID', {day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'})"></td>
                                    <td class="px-6 py-4 whitespace-nowrap text-sm font-bold text-gray-800" x-text="order.order_number"></td>
                                    <td class="px-6 py-4 whitespace-nowrap text-sm font-bold text-primary" x-text="formatPrice(order.total_price)"></td>
                                    <td class="px-6 py-4 whitespace-nowrap text-sm">
                                        <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-bold" :class="order.payment_status === 'paid' ? 'bg-green-50 text-green-700 border border-green-200' : 'bg-yellow-50 text-yellow-700 border border-yellow-200'" x-text="order.payment_status.charAt(0).toUpperCase() + order.payment_status.slice(1)"></span>
                                    </td>
                                    <td class="px-6 py-4 whitespace-nowrap text-sm">
                                        <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-bold border" :class="getStatusBadgeClass(order.status)" x-text="order.status.charAt(0).toUpperCase() + order.status.slice(1)"></span>
                                    </td>
                                    <td class="px-6 py-4 whitespace-nowrap text-right text-sm">
                                        <a :href="'/order-detail.html?id=' + order.id" class="inline-flex items-center justify-center px-4 py-2 border border-primary/20 text-xs font-bold text-primary hover:bg-primary/5 rounded-2xl transition duration-300">
                                            Detail
                                        </a>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>

    <!-- Footer Container -->
    <div id="footer-container"></div>

    <script>
        function ordersPage() {
            return {
                orders: [],
                init() {
                    this.orders = window.db.getOrders();
                },
                getStatusBadgeClass(status) {
                    const classes = {
                        'pending': 'bg-yellow-50 text-yellow-700 border-yellow-200',
                        'confirmed': 'bg-blue-50 text-blue-700 border-blue-200',
                        'processing': 'bg-purple-50 text-purple-700 border-purple-200',
                        'shipped': 'bg-indigo-50 text-indigo-700 border-indigo-200',
                        'delivered': 'bg-green-50 text-green-700 border-green-200',
                        'cancelled': 'bg-red-50 text-red-700 border-red-200'
                    };
                    return classes[status] || 'bg-gray-50 text-gray-700 border-gray-200';
                }
            }
        }
    </script>
</body>
</html>
