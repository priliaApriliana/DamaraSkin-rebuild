<!DOCTYPE html>
<html lang="id" class="h-full bg-gray-50">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Profil Admin - DamaraSkin Admin</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/module.esm.js"></script>
  <script type="module" crossorigin src="/assets/compiled-KLbNheu3.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/compiled-DXAZJh9h.css">
</head>
<body class="font-poppins antialiased text-gray-800 h-full selection:bg-primary/20 selection:text-primary" x-data="{ sidebarOpen: false }">
    <div class="min-h-full flex">
        
        <!-- Sidebar Container -->
        <div id="admin-sidebar-container"></div>

        <!-- Page wrapper -->
        <div class="md:pl-64 flex flex-col flex-1 w-0">
            <!-- Mobile header -->
            <div class="sticky top-0 z-10 md:hidden pl-1 pt-1 sm:pl-3 sm:pt-3 bg-white border-b border-gray-200 flex items-center h-16">
                <button @click="sidebarOpen = true" class="-ml-0.5 -mt-0.5 h-12 w-12 inline-flex items-center justify-center rounded-xl text-gray-500 hover:text-gray-900 focus:outline-none">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
                </button>
                <div class="ml-4 flex items-center gap-2">
                    <img src="/images/logo.png" alt="DamaraSkin Logo" class="h-8 w-auto">
                    <span class="font-brush text-2xl text-primary font-bold">DamaraSkin Admin</span>
                </div>
            </div>

            <main class="flex-grow py-6 px-4 sm:px-6 lg:px-8" x-data="adminProfilePage()">
                <div class="max-w-7xl mx-auto">
                    <div class="mb-8">
                        <h1 class="text-2xl font-bold text-gray-800">Profil Admin</h1>
                        <p class="text-xs text-gray-500 mt-1">Perbarui informasi kontak dan keamanan akun administrator Anda.</p>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        
                        <!-- Left Column: Edit Profile Info -->
                        <div class="lg:col-span-2 space-y-8">
                            <!-- Personal Info Card -->
                            <div class="bg-white rounded-2xl border border-gray-200/80 shadow-[0_4px_20px_-4px_rgba(0,0,0,0.02)] p-6 sm:p-8">
                                <h2 class="text-base font-bold text-gray-800 mb-6">Informasi Personal</h2>
                                
                                <div x-show="infoSuccess" x-transition class="bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-xl mb-6 flex justify-between items-center" x-cloak>
                                    <span class="text-sm font-medium">Profil berhasil diperbarui.</span>
                                </div>

                                <form @submit.prevent="saveProfile()" class="space-y-6">
                                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                                        <div>
                                            <label for="name" class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Nama Lengkap</label>
                                            <input type="text" x-model="name" id="name" required class="block w-full px-4 py-2.5 bg-white border border-gray-200/80 focus:border-primary focus:ring-4 focus:ring-primary/10 rounded-xl text-sm text-gray-700 transition">
                                        </div>
                                        <div>
                                            <label for="email" class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Email</label>
                                            <input type="email" x-model="email" id="email" required class="block w-full px-4 py-2.5 bg-white border border-gray-200/80 focus:border-primary focus:ring-4 focus:ring-primary/10 rounded-xl text-sm text-gray-700 transition">
                                        </div>
                                    </div>

                                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                                        <div>
                                            <label for="phone" class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Nomor Telepon</label>
                                            <input type="text" x-model="phone" id="phone" class="block w-full px-4 py-2.5 bg-white border border-gray-200/80 focus:border-primary focus:ring-4 focus:ring-primary/10 rounded-xl text-sm text-gray-700 transition" placeholder="Contoh: 08123456789">
                                        </div>
                                        <div>
                                            <label for="address" class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Alamat Kantor</label>
                                            <input type="text" x-model="address" id="address" class="block w-full px-4 py-2.5 bg-white border border-gray-200/80 focus:border-primary focus:ring-4 focus:ring-primary/10 rounded-xl text-sm text-gray-700 transition" placeholder="Gedung Damara Lt. 3">
                                        </div>
                                    </div>

                                    <div class="flex justify-end pt-4 border-t border-gray-100">
                                        <button type="submit" class="px-6 py-3 bg-primary hover:bg-accent text-white text-xs font-bold rounded-xl transition shadow-md shadow-primary/15">
                                            Simpan Perubahan
                                        </button>
                                    </div>
                                </form>
                            </div>

                            <!-- Password Card -->
                            <div class="bg-white rounded-2xl border border-gray-200/80 shadow-[0_4px_20px_-4px_rgba(0,0,0,0.02)] p-6 sm:p-8">
                                <h2 class="text-base font-bold text-gray-800 mb-6">Ubah Password</h2>

                                <div x-show="passSuccess" x-transition class="bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-xl mb-6 flex justify-between items-center" x-cloak>
                                    <span class="text-sm font-medium">Password berhasil diperbarui.</span>
                                </div>
                                
                                <div x-show="passError" x-transition class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl mb-6 flex justify-between items-center" x-cloak>
                                    <span class="text-sm font-medium" x-text="passError"></span>
                                </div>

                                <form @submit.prevent="savePassword()" class="space-y-6">
                                    <div>
                                        <label for="current_password" class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Password Saat Ini</label>
                                        <input type="password" x-model="currentPassword" id="current_password" required class="block w-full px-4 py-2.5 bg-white border border-gray-200/80 focus:border-primary focus:ring-4 focus:ring-primary/10 rounded-xl text-sm text-gray-700 transition">
                                    </div>

                                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                                        <div>
                                            <label for="password" class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Password Baru</label>
                                            <input type="password" x-model="newPassword" id="password" required class="block w-full px-4 py-2.5 bg-white border border-gray-200/80 focus:border-primary focus:ring-4 focus:ring-primary/10 rounded-xl text-sm text-gray-700 transition">
                                        </div>
                                        <div>
                                            <label for="password_confirmation" class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Konfirmasi Password Baru</label>
                                            <input type="password" x-model="confirmPassword" id="password_confirmation" required class="block w-full px-4 py-2.5 bg-white border border-gray-200/80 focus:border-primary focus:ring-4 focus:ring-primary/10 rounded-xl text-sm text-gray-700 transition">
                                        </div>
                                    </div>

                                    <div class="flex justify-end pt-4 border-t border-gray-100">
                                        <button type="submit" class="px-6 py-3 bg-primary hover:bg-accent text-white text-xs font-bold rounded-xl transition shadow-md shadow-primary/15">
                                            Perbarui Password
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>

                        <!-- Right Column: Meta card -->
                        <div>
                            <div class="bg-white p-6 rounded-2xl border border-gray-200/80 shadow-[0_4px_20px_-4px_rgba(0,0,0,0.02)] flex flex-col items-center text-center">
                                <div class="relative h-24 w-24 rounded-2xl bg-gradient-to-tr from-primary to-accent p-0.5 shadow-md shadow-primary/20 mb-4">
                                    <div class="h-full w-full rounded-[14px] bg-white flex items-center justify-center text-primary font-bold text-3xl" x-text="getInitials(name)"></div>
                                </div>
                                <h2 class="text-lg font-bold text-gray-800" x-text="name"></h2>
                                <span class="inline-flex items-center px-3 py-1 rounded-lg text-xs font-semibold border border-primary/20 text-primary bg-primary/5 mt-1.5 mb-6">Administrator</span>
                                
                                <div class="w-full space-y-4 border-t border-gray-100 pt-6 text-left text-sm">
                                    <div>
                                        <span class="text-xs text-gray-400 font-bold uppercase tracking-wider block">Hak Akses</span>
                                        <span class="text-gray-700 font-bold text-xs bg-gray-100 border border-gray-200 px-2.5 py-1 rounded-lg inline-block mt-1">Full Root Admin</span>
                                    </div>
                                    <div>
                                        <span class="text-xs text-gray-400 font-bold uppercase tracking-wider block">Terdaftar Sejak</span>
                                        <span class="text-gray-700 font-medium">12 Juni 2026</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        function adminProfilePage() {
            return {
                name: '',
                email: '',
                phone: '',
                address: '',
                currentPassword: '',
                newPassword: '',
                confirmPassword: '',
                infoSuccess: false,
                passSuccess: false,
                passError: '',
                init() {
                    const u = window.db.getCurrentUser();
                    if (u) {
                        this.name = u.name;
                        this.email = u.email;
                        this.phone = u.phone || '';
                        this.address = u.address || '';
                    }
                },
                getInitials(name) {
                    if (!name) return 'A';
                    const parts = name.split(' ');
                    return parts.map(p => p.charAt(0)).slice(0, 2).join('').toUpperCase();
                },
                saveProfile() {
                    this.infoSuccess = false;
                    const res = window.db.updateProfile(this.name, this.email, this.phone, this.address);
                    if (res.success) {
                        this.infoSuccess = true;
                        window.dispatchEvent(new Event('user-logged-in'));
                        setTimeout(() => this.infoSuccess = false, 3000);
                    }
                },
                savePassword() {
                    this.passSuccess = false;
                    this.passError = '';
                    if (this.newPassword !== this.confirmPassword) {
                        this.passError = 'Konfirmasi password baru tidak cocok.';
                        return;
                    }
                    if (this.newPassword.length < 8) {
                        this.passError = 'Password baru minimal harus 8 karakter.';
                        return;
                    }
                    const res = window.db.updatePassword(this.currentPassword, this.newPassword);
                    if (res.success) {
                        this.passSuccess = true;
                        this.currentPassword = '';
                        this.newPassword = '';
                        this.confirmPassword = '';
                        setTimeout(() => this.passSuccess = false, 3000);
                    } else {
                        this.passError = res.message || 'Gagal memperbarui password.';
                    }
                }
            }
        }
    </script>
</body>
</html>
