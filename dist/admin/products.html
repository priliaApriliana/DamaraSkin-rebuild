<!DOCTYPE html>
<html lang="id" class="h-full bg-gray-50">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kelola Produk - DamaraSkin Admin</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/module.esm.js"></script>
  <script type="module" crossorigin src="/assets/compiled-KLbNheu3.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/compiled-DXAZJh9h.css">
</head>
<body class="font-poppins antialiased text-gray-800 h-full selection:bg-primary/20 selection:text-primary" x-data="{ sidebarOpen: false }">
    <div class="min-h-full flex">
        
        <!-- Sidebar Container -->
        <div id="admin-sidebar-container"></div>

        <!-- Page wrapper -->
        <div class="md:pl-64 flex flex-col flex-1 w-0">
            <!-- Mobile header -->
            <div class="sticky top-0 z-10 md:hidden pl-1 pt-1 sm:pl-3 sm:pt-3 bg-white border-b border-gray-200 flex items-center h-16">
                <button @click="sidebarOpen = true" class="-ml-0.5 -mt-0.5 h-12 w-12 inline-flex items-center justify-center rounded-xl text-gray-500 hover:text-gray-900 focus:outline-none">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
                </button>
                <div class="ml-4 flex items-center gap-2">
                    <img src="/images/logo.png" alt="DamaraSkin Logo" class="h-8 w-auto">
                    <span class="font-brush text-2xl text-primary font-bold">DamaraSkin Admin</span>
                </div>
            </div>

            <main class="flex-grow py-6 px-4 sm:px-6 lg:px-8" x-data="adminProductsPage()">
                <div class="max-w-7xl mx-auto">
                    <div class="mb-8 flex justify-between items-center">
                        <div>
                            <h1 class="text-2xl font-bold text-gray-800">Kelola Produk</h1>
                            <p class="text-xs text-gray-500 mt-1">Daftar produk skincare yang aktif dijual di DamaraSkin.</p>
                        </div>
                        <a href="/admin/product-create.html" class="inline-flex items-center justify-center px-5 py-2.5 text-xs font-bold text-white bg-primary hover:bg-accent rounded-xl transition shadow-md shadow-primary/15">
                            <svg class="h-4 w-4 mr-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                            Tambah Produk Baru
                        </a>
                    </div>

                    <!-- Alerts -->
                    <div x-show="alertSuccess" x-transition class="bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-xl mb-6 flex justify-between items-center" x-cloak>
                        <span class="text-sm font-medium" x-text="alertSuccess"></span>
                        <button @click="alertSuccess = ''" class="text-green-500 hover:text-green-700">
                            <svg class="h-4 w-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
                        </button>
                    </div>

                    <!-- Products Table -->
                    <div class="bg-white rounded-2xl border border-gray-200/80 shadow-[0_4px_20px_-4px_rgba(0,0,0,0.02)] overflow-hidden">
                        <div class="overflow-x-auto">
                            <table class="min-w-full divide-y divide-gray-100">
                                <thead class="bg-gray-50/50">
                                    <tr>
                                        <th class="px-6 py-3.5 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Gambar</th>
                                        <th class="px-6 py-3.5 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Nama Produk</th>
                                        <th class="px-6 py-3.5 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Kategori</th>
                                        <th class="px-6 py-3.5 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Harga</th>
                                        <th class="px-6 py-3.5 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Stok</th>
                                        <th class="px-6 py-3.5 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Jenis Kulit</th>
                                        <th class="px-6 py-3.5 text-right text-xs font-semibold text-gray-500 uppercase tracking-wider">Aksi</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-gray-100">
                                    <template x-for="product in products" :key="product.id">
                                        <tr class="hover:bg-gray-50/60 transition duration-150">
                                            <td class="px-6 py-4 whitespace-nowrap">
                                                <div class="h-10 w-10 rounded-lg overflow-hidden border border-gray-150 bg-gray-50 shadow-sm">
                                                    <img :src="product.images[0]" class="h-full w-full object-cover">
                                                </div>
                                            </td>
                                            <td class="px-6 py-4 whitespace-nowrap">
                                                <div class="text-sm font-bold text-gray-800" x-text="product.name"></div>
                                            </td>
                                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 capitalize" x-text="product.category"></td>
                                            <td class="px-6 py-4 whitespace-nowrap text-sm font-bold text-primary" x-text="formatPrice(product.price)"></td>
                                            <td class="px-6 py-4 whitespace-nowrap text-sm font-semibold text-gray-805" x-text="product.stock"></td>
                                            <td class="px-6 py-4 whitespace-nowrap text-sm">
                                                <span class="inline-flex items-center px-2.5 py-1 rounded-lg text-xs font-bold border border-gray-205 bg-gray-50 text-gray-500" x-text="product.skin_type === 'all' ? 'Semua Tipe' : product.skin_type.charAt(0).toUpperCase() + product.skin_type.slice(1)"></span>
                                            </td>
                                            <td class="px-6 py-4 whitespace-nowrap text-right text-sm space-x-2">
                                                <a :href="'/admin/product-edit.html?id=' + product.id" class="inline-flex items-center px-3 py-1.5 border border-blue-100 text-xs font-bold text-blue-600 bg-blue-50 hover:bg-blue-600 hover:text-white rounded-lg transition duration-200">Ubah</a>
                                                <button @click="deleteProduct(product)" class="inline-flex items-center px-3 py-1.5 border border-red-100 text-xs font-bold text-red-600 bg-red-50 hover:bg-red-600 hover:text-white rounded-lg transition duration-200">Hapus</button>
                                            </td>
                                        </tr>
                                    </template>
                                    <template x-if="products.length === 0">
                                        <tr>
                                            <td colspan="7" class="px-6 py-8 text-center text-sm text-gray-400 italic">Belum ada produk terdaftar.</td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        function adminProductsPage() {
            return {
                products: [],
                alertSuccess: '',
                init() {
                    this.loadProducts();
                },
                loadProducts() {
                    this.products = window.db.getProducts();
                },
                deleteProduct(product) {
                    if (confirm(`Apakah Anda yakin ingin menghapus produk "${product.name}"?`)) {
                        window.db.deleteProduct(product.id);
                        this.alertSuccess = 'Produk berhasil dihapus.';
                        this.loadProducts();
                        setTimeout(() => this.alertSuccess = '', 3000);
                    }
                }
            }
        }
    </script>
</body>
</html>
