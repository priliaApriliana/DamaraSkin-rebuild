<!DOCTYPE html>
<html lang="id" class="h-full bg-gray-50">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ubah Artikel - DamaraSkin Admin</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/module.esm.js"></script>
  <script type="module" crossorigin src="/assets/compiled-KLbNheu3.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/compiled-DXAZJh9h.css">
</head>
<body class="font-poppins antialiased text-gray-800 h-full selection:bg-primary/20 selection:text-primary" x-data="{ sidebarOpen: false }">
    <div class="min-h-full flex">
        
        <!-- Sidebar Container -->
        <div id="admin-sidebar-container"></div>

        <!-- Page wrapper -->
        <div class="md:pl-64 flex flex-col flex-1 w-0">
            <!-- Mobile header -->
            <div class="sticky top-0 z-10 md:hidden pl-1 pt-1 sm:pl-3 sm:pt-3 bg-white border-b border-gray-200 flex items-center h-16">
                <button @click="sidebarOpen = true" class="-ml-0.5 -mt-0.5 h-12 w-12 inline-flex items-center justify-center rounded-xl text-gray-500 hover:text-gray-900 focus:outline-none">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
                </button>
                <div class="ml-4 flex items-center gap-2">
                    <img src="/images/logo.png" alt="DamaraSkin Logo" class="h-8 w-auto">
                    <span class="font-brush text-2xl text-primary font-bold">DamaraSkin Admin</span>
                </div>
            </div>

            <main class="flex-grow py-6 px-4 sm:px-6 lg:px-8" x-data="editArticlePage()">
                <div class="max-w-7xl mx-auto">
                    <div class="mb-8 flex justify-between items-center border-b border-gray-150 pb-5">
                        <div>
                            <h1 class="text-2xl font-bold text-gray-800">Ubah Artikel</h1>
                            <p class="text-xs text-gray-500 mt-1" x-text="'Edit detail untuk ' + title"></p>
                        </div>
                        <a href="/admin/articles.html" class="text-xs font-bold text-primary hover:text-accent transition">&larr; Kembali ke Daftar</a>
                    </div>

                    <!-- Edit Form -->
                    <template x-if="article">
                        <div class="bg-white rounded-2xl border border-gray-200/80 shadow-[0_4px_20px_-4px_rgba(0,0,0,0.02)] p-6 sm:p-8 max-w-3xl">
                            <form @submit.prevent="submitArticle()" class="space-y-6">
                                
                                <!-- Article Title -->
                                <div>
                                    <label for="title" class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Judul Artikel</label>
                                    <input type="text" x-model="title" @input="generateSlug()" id="title" required class="block w-full px-4 py-2.5 bg-white border border-gray-200/80 focus:border-primary focus:ring-4 focus:ring-primary/10 rounded-xl text-sm text-gray-700 transition">
                                </div>

                                <!-- Article Slug -->
                                <div>
                                    <label for="slug" class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Slug URL</label>
                                    <input type="text" x-model="slug" id="slug" required class="block w-full px-4 py-2.5 bg-white border border-gray-200/80 focus:border-primary focus:ring-4 focus:ring-primary/10 rounded-xl text-sm text-gray-700 transition">
                                </div>

                                <!-- Article Excerpt -->
                                <div>
                                    <label for="excerpt" class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Ringkasan Artikel (Excerpt)</label>
                                    <textarea x-model="excerpt" id="excerpt" rows="2" required class="block w-full px-4 py-2.5 bg-white border border-gray-200/80 focus:border-primary focus:ring-4 focus:ring-primary/10 rounded-xl text-sm text-gray-700 transition"></textarea>
                                </div>

                                <!-- Featured Image URL -->
                                <div>
                                    <label for="image_url" class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">URL Gambar Utama</label>
                                    <input type="text" x-model="image_url" id="image_url" required class="block w-full px-4 py-2.5 bg-white border border-gray-200/80 focus:border-primary focus:ring-4 focus:ring-primary/10 rounded-xl text-sm text-gray-700 transition">
                                </div>

                                <!-- Content -->
                                <div>
                                    <label for="content" class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Konten Lengkap (Format HTML)</label>
                                    <textarea x-model="content" id="content" rows="10" required class="block w-full px-4 py-2.5 bg-white border border-gray-200/80 focus:border-primary focus:ring-4 focus:ring-primary/10 rounded-xl text-sm text-gray-700 font-mono transition"></textarea>
                                </div>

                                <!-- Submit Button -->
                                <div class="pt-4 flex justify-end space-x-3">
                                    <a href="/admin/articles.html" class="px-6 py-3 border border-gray-200 text-xs font-bold rounded-xl text-gray-500 hover:bg-gray-55 transition">Batal</a>
                                    <button type="submit" class="px-6 py-3 bg-primary hover:bg-accent text-white text-xs font-bold rounded-xl transition shadow-md shadow-primary/15">Simpan Perubahan</button>
                                </div>
                            </form>
                        </div>
                    </template>
                </div>
            </main>
        </div>
    </div>

    <script>
        function editArticlePage() {
            return {
                article: null,
                title: '',
                slug: '',
                excerpt: '',
                image_url: '',
                content: '',
                init() {
                    const params = new URLSearchParams(window.location.search);
                    const id = params.get('id');
                    if (!id) {
                        window.location.href = '/admin/articles.html';
                        return;
                    }
                    this.article = window.db.getArticleById(id);
                    if (!this.article) {
                        window.location.href = '/admin/articles.html';
                        return;
                    }

                    this.title = this.article.title.rendered;
                    this.slug = this.article.slug;
                    this.excerpt = this.article.excerpt.rendered;
                    this.image_url = this.article.jetpack_featured_media_url;
                    this.content = this.article.content.rendered;
                },
                generateSlug() {
                    this.slug = this.title.toLowerCase()
                        .replace(/[^\w ]+/g, '')
                        .replace(/ +/g, '-');
                },
                submitArticle() {
                    const articleData = {
                        id: this.article.id,
                        title: { rendered: this.title },
                        slug: this.slug,
                        excerpt: { rendered: this.excerpt },
                        jetpack_featured_media_url: this.image_url,
                        content: { rendered: this.content },
                        date: this.article.date
                    };

                    const saved = window.db.saveArticle(articleData);
                    if (saved) {
                        window.location.href = '/admin/articles.html';
                    }
                }
            }
        }
    </script>
</body>
</html>
