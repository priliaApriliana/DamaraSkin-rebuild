<!DOCTYPE html>
<html lang="id" class="h-full bg-gray-50">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard Admin - DamaraSkin</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/module.esm.js"></script>
  <script type="module" crossorigin src="/assets/compiled-KLbNheu3.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/compiled-DXAZJh9h.css">
</head>
<body class="font-poppins antialiased text-gray-800 h-full selection:bg-primary/20 selection:text-primary" x-data="{ sidebarOpen: false }">
    <div class="min-h-full flex">
        
        <!-- Sidebar Container (injected dynamically via JS) -->
        <div id="admin-sidebar-container"></div>

        <!-- Page wrapper -->
        <div class="md:pl-64 flex flex-col flex-1 w-0">
            <!-- Mobile header -->
            <div class="sticky top-0 z-10 md:hidden pl-1 pt-1 sm:pl-3 sm:pt-3 bg-white border-b border-gray-200 flex items-center h-16">
                <button @click="sidebarOpen = true" class="-ml-0.5 -mt-0.5 h-12 w-12 inline-flex items-center justify-center rounded-xl text-gray-500 hover:text-gray-900 focus:outline-none">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
                </button>
                <div class="ml-4 flex items-center gap-2">
                    <img src="/images/logo.png" alt="DamaraSkin Logo" class="h-8 w-auto">
                    <span class="font-brush text-2xl text-primary font-bold">DamaraSkin Admin</span>
                </div>
            </div>

            <main class="flex-grow py-6 px-4 sm:px-6 lg:px-8" x-data="adminDashboardPage()">
                <div class="max-w-7xl mx-auto">
                    <div class="mb-8 flex justify-between items-center">
                        <div>
                            <h1 class="text-2xl font-bold text-gray-800">Dashboard</h1>
                            <p class="text-xs text-gray-500 mt-1">Selamat datang kembali di panel administrasi DamaraSkin.</p>
                        </div>
                    </div>

                    <!-- Statistics Grid -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                        <!-- Revenue Card -->
                        <div class="bg-white p-6 rounded-2xl border border-gray-200/80 shadow-[0_4px_20px_-4px_rgba(0,0,0,0.02)] flex items-center hover:-translate-y-0.5 hover:shadow-md transition duration-300">
                            <div class="p-3 bg-green-500/15 text-green-600 rounded-xl mr-4 border border-green-500/20">
                                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                            </div>
                            <div>
                                <span class="text-xs text-gray-400 font-bold uppercase tracking-wider block">Pendapatan</span>
                                <span class="text-xl font-bold text-gray-800" x-text="formatPrice(revenue)"></span>
                            </div>
                        </div>

                        <!-- Transactions Card -->
                        <div class="bg-white p-6 rounded-2xl border border-gray-200/80 shadow-[0_4px_20px_-4px_rgba(0,0,0,0.02)] flex items-center hover:-translate-y-0.5 hover:shadow-md transition duration-300">
                            <div class="p-3 bg-blue-500/15 text-blue-600 rounded-xl mr-4 border border-blue-500/20">
                                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                            </div>
                            <div>
                                <span class="text-xs text-gray-400 font-bold uppercase tracking-wider block">Total Pesanan</span>
                                <span class="text-xl font-bold text-gray-800" x-text="totalOrders"></span>
                            </div>
                        </div>

                        <!-- Users Card -->
                        <div class="bg-white p-6 rounded-2xl border border-gray-200/80 shadow-[0_4px_20px_-4px_rgba(0,0,0,0.02)] flex items-center hover:-translate-y-0.5 hover:shadow-md transition duration-300">
                            <div class="p-3 bg-purple-500/15 text-purple-600 rounded-xl mr-4 border border-purple-200/20">
                                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
                            </div>
                            <div>
                                <span class="text-xs text-gray-400 font-bold uppercase tracking-wider block">Pelanggan</span>
                                <span class="text-xl font-bold text-gray-800" x-text="totalUsers"></span>
                            </div>
                        </div>

                        <!-- Products Card -->
                        <div class="bg-white p-6 rounded-2xl border border-gray-200/80 shadow-[0_4px_20px_-4px_rgba(0,0,0,0.02)] flex items-center hover:-translate-y-0.5 hover:shadow-md transition duration-300">
                            <div class="p-3 bg-primary/15 text-primary rounded-xl mr-4 border border-primary/20">
                                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
                            </div>
                            <div>
                                <span class="text-xs text-gray-400 font-bold uppercase tracking-wider block">Total Produk</span>
                                <span class="text-xl font-bold text-gray-800" x-text="totalProducts"></span>
                            </div>
                        </div>
                    </div>

                    <!-- Main Grid Content -->
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <!-- Recent Orders Table (2/3 width) -->
                        <div class="lg:col-span-2 bg-white rounded-2xl border border-gray-200/80 shadow-[0_4px_20px_-4px_rgba(0,0,0,0.02)] overflow-hidden">
                            <div class="px-6 py-5 border-b border-gray-100 flex justify-between items-center">
                                <h2 class="text-base font-bold text-gray-800">Pesanan Terbaru</h2>
                                <a href="/admin/orders.html" class="text-xs text-primary font-bold hover:text-accent transition">Lihat Semua</a>
                            </div>
                            
                            <div class="overflow-x-auto">
                                <table class="min-w-full divide-y divide-gray-100">
                                    <thead class="bg-gray-50/50">
                                        <tr>
                                            <th class="px-6 py-3.5 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Nomor Pesanan</th>
                                            <th class="px-6 py-3.5 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Pelanggan</th>
                                            <th class="px-6 py-3.5 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Tanggal</th>
                                            <th class="px-6 py-3.5 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Total</th>
                                            <th class="px-6 py-3.5 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Status</th>
                                            <th class="px-6 py-3.5 text-right text-xs font-semibold text-gray-500 uppercase tracking-wider">Aksi</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-gray-100">
                                        <template x-for="order in recentOrders" :key="order.id">
                                            <tr class="hover:bg-gray-50/60 transition duration-150">
                                                <td class="px-6 py-4 whitespace-nowrap text-sm font-bold text-gray-800" x-text="order.order_number"></td>
                                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600" x-text="order.recipient_name"></td>
                                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-400" x-text="new Date(order.created_at).toLocaleDateString('id-ID', {day: 'numeric', month: 'short', year: 'numeric'})"></td>
                                                <td class="px-6 py-4 whitespace-nowrap text-sm font-bold text-primary" x-text="formatPrice(order.total_price)"></td>
                                                <td class="px-6 py-4 whitespace-nowrap text-sm">
                                                    <span class="inline-flex items-center px-2.5 py-1 rounded-lg text-xs font-bold border" :class="getStatusBadgeClass(order.status)" x-text="order.status.charAt(0).toUpperCase() + order.status.slice(1)"></span>
                                                </td>
                                                <td class="px-6 py-4 whitespace-nowrap text-right text-sm">
                                                    <a :href="'/admin/order-detail.html?id=' + order.id" class="inline-flex items-center px-3 py-1.5 border border-primary/20 text-xs font-bold text-primary bg-primary/5 hover:bg-primary hover:text-white rounded-xl transition duration-200">Detail</a>
                                                </td>
                                            </tr>
                                        </template>
                                        <template x-if="recentOrders.length === 0">
                                            <tr>
                                                <td colspan="6" class="px-6 py-8 text-center text-sm text-gray-400 italic">Belum ada pesanan masuk.</td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <!-- Admin Profile Widget Card (1/3 width) -->
                        <template x-if="currentUser">
                            <div class="bg-white p-6 rounded-2xl border border-gray-200/80 shadow-[0_4px_20px_-4px_rgba(0,0,0,0.02)] flex flex-col items-center text-center h-fit">
                                <div class="relative h-20 w-20 rounded-2xl bg-gradient-to-tr from-primary to-accent p-0.5 shadow-md shadow-primary/20 mb-4">
                                    <div class="h-full w-full rounded-[14px] bg-white flex items-center justify-center text-primary font-bold text-2xl" x-text="getInitials(currentUser.name)"></div>
                                </div>
                                <h2 class="text-lg font-bold text-gray-800" x-text="currentUser.name"></h2>
                                <span class="inline-flex items-center px-3 py-1 rounded-lg text-xs font-semibold border border-primary/20 text-primary bg-primary/5 mt-1.5 mb-6">Administrator</span>
                                
                                <div class="w-full space-y-4 border-t border-gray-100 pt-6 text-left text-sm">
                                    <div>
                                        <span class="text-xs text-gray-400 font-bold uppercase tracking-wider block">Email</span>
                                        <span class="text-gray-700 font-medium" x-text="currentUser.email"></span>
                                    </div>
                                    <div>
                                        <span class="text-xs text-gray-400 font-bold uppercase tracking-wider block">Nomor Telepon</span>
                                        <span class="text-gray-700 font-medium" x-text="currentUser.phone || 'Belum diatur'"></span>
                                    </div>
                                    <div>
                                        <span class="text-xs text-gray-400 font-bold uppercase tracking-wider block">Alamat Kantor</span>
                                        <span class="text-gray-700 font-medium" x-text="currentUser.address || 'Belum diatur'"></span>
                                    </div>
                                </div>
                                
                                <a href="/admin/profile.html" class="w-full inline-flex justify-center items-center px-4 py-2 text-xs font-bold text-primary hover:bg-primary hover:text-white border border-primary/25 rounded-xl mt-6 transition duration-300">
                                    Edit Profil & Keamanan
                                </a>
                            </div>
                        </template>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        function adminDashboardPage() {
            return {
                currentUser: null,
                revenue: 0,
                totalOrders: 0,
                totalUsers: 0,
                totalProducts: 0,
                recentOrders: [],
                init() {
                    this.currentUser = window.db.getCurrentUser();
                    
                    const allOrders = window.db.getAllOrders();
                    this.totalOrders = allOrders.length;
                    
                    // Sales Revenue = sum of completed/non-cancelled order totals
                    this.revenue = allOrders
                        .filter(o => o.status !== 'cancelled')
                        .reduce((sum, o) => sum + o.total_price, 0);

                    // Customers count
                    this.totalUsers = window.db.getUsers().filter(u => u.role === 'user').length;

                    // Products count
                    this.totalProducts = window.db.getProducts().length;

                    // Load top 5 recent orders
                    this.recentOrders = allOrders.slice(0, 5);
                },
                getInitials(name) {
                    if (!name) return 'A';
                    const parts = name.split(' ');
                    return parts.map(p => p.charAt(0)).slice(0, 2).join('').toUpperCase();
                },
                getStatusBadgeClass(status) {
                    const classes = {
                        'pending': 'bg-yellow-500/10 text-yellow-700 border-yellow-500/20',
                        'confirmed': 'bg-blue-500/10 text-blue-700 border-blue-500/20',
                        'processing': 'bg-purple-500/10 text-purple-700 border-purple-500/20',
                        'shipped': 'bg-indigo-500/10 text-indigo-700 border-indigo-500/20',
                        'delivered': 'bg-green-500/10 text-green-700 border-green-500/20',
                        'cancelled': 'bg-red-500/10 text-red-700 border-red-500/20'
                    };
                    return classes[status] || 'bg-gray-500/10 text-gray-700 border-gray-500/20';
                }
            }
        }
    </script>
</body>
</html>
