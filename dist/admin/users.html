<!DOCTYPE html>
<html lang="id" class="h-full bg-gray-50">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kelola User - DamaraSkin Admin</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/module.esm.js"></script>
  <script type="module" crossorigin src="/assets/compiled-KLbNheu3.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/compiled-DXAZJh9h.css">
</head>
<body class="font-poppins antialiased text-gray-800 h-full selection:bg-primary/20 selection:text-primary" x-data="{ sidebarOpen: false }">
    <div class="min-h-full flex">
        
        <!-- Sidebar Container -->
        <div id="admin-sidebar-container"></div>

        <!-- Page wrapper -->
        <div class="md:pl-64 flex flex-col flex-1 w-0">
            <!-- Mobile header -->
            <div class="sticky top-0 z-10 md:hidden pl-1 pt-1 sm:pl-3 sm:pt-3 bg-white border-b border-gray-200 flex items-center h-16">
                <button @click="sidebarOpen = true" class="-ml-0.5 -mt-0.5 h-12 w-12 inline-flex items-center justify-center rounded-xl text-gray-500 hover:text-gray-900 focus:outline-none">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
                </button>
                <div class="ml-4 flex items-center gap-2">
                    <img src="/images/logo.png" alt="DamaraSkin Logo" class="h-8 w-auto">
                    <span class="font-brush text-2xl text-primary font-bold">DamaraSkin Admin</span>
                </div>
            </div>

            <main class="flex-grow py-6 px-4 sm:px-6 lg:px-8" x-data="adminUsersPage()">
                <div class="max-w-7xl mx-auto">
                    <div class="mb-8 flex justify-between items-center">
                        <div>
                            <h1 class="text-2xl font-bold text-gray-800">Kelola User</h1>
                            <p class="text-xs text-gray-500 mt-1">Daftar pengguna dan status hak akses akun DamaraSkin.</p>
                        </div>
                    </div>

                    <!-- Alerts -->
                    <div x-show="alertSuccess" x-transition class="bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-2xl mb-6 flex justify-between items-center" x-cloak>
                        <span class="text-sm font-medium" x-text="alertSuccess"></span>
                        <button @click="alertSuccess = ''" class="text-green-500 hover:text-green-700">
                            <svg class="h-4 w-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
                        </button>
                    </div>

                    <!-- Search and Filter -->
                    <div class="mb-6 flex flex-col sm:flex-row gap-4 justify-between items-center bg-white p-4 rounded-2xl border border-gray-200/80 shadow-[0_4px_20px_-4px_rgba(0,0,0,0.02)]">
                        <div class="relative w-full sm:w-80">
                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                            </span>
                            <input type="text" x-model="searchQuery" placeholder="Cari nama atau email..." class="w-full pl-10 pr-4 py-2 bg-white border border-gray-200/80 focus:border-primary focus:ring-4 focus:ring-primary/10 rounded-xl text-sm text-gray-700 transition duration-200">
                        </div>
                        <div class="flex gap-2 w-full sm:w-auto font-bold text-gray-750">
                            <select x-model="roleFilter" class="w-full sm:w-40 px-3 py-2 border border-gray-200/80 rounded-xl focus:ring-primary focus:border-primary focus:ring-4 focus:ring-primary/10 text-sm bg-white transition duration-200">
                                <option value="all">Semua Peran</option>
                                <option value="user">Pelanggan</option>
                                <option value="admin">Administrator</option>
                            </select>
                            <select x-model="statusFilter" class="w-full sm:w-40 px-3 py-2 border border-gray-200/80 rounded-xl focus:ring-primary focus:border-primary focus:ring-4 focus:ring-primary/10 text-sm bg-white transition duration-200 font-bold">
                                <option value="all">Semua Status</option>
                                <option value="active">Aktif</option>
                                <option value="suspended">Ditangguhkan</option>
                            </select>
                        </div>
                    </div>

                    <!-- Users Table -->
                    <div class="bg-white rounded-2xl border border-gray-200/80 shadow-[0_4px_20px_-4px_rgba(0,0,0,0.02)] overflow-hidden">
                        <div class="overflow-x-auto">
                            <table class="min-w-full divide-y divide-gray-100">
                                <thead class="bg-gray-50/50">
                                    <tr>
                                        <th class="px-6 py-3.5 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Nama & Peran</th>
                                        <th class="px-6 py-3.5 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Kontak</th>
                                        <th class="px-6 py-3.5 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Tipe Kulit</th>
                                        <th class="px-6 py-3.5 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Masalah Kulit</th>
                                        <th class="px-6 py-3.5 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Status</th>
                                        <th class="px-6 py-3.5 text-right text-xs font-semibold text-gray-500 uppercase tracking-wider">Aksi</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-gray-100">
                                    <template x-for="user in filteredUsers" :key="user.id">
                                        <tr class="hover:bg-gray-50/60 transition duration-150">
                                            <!-- Name and Role -->
                                            <td class="px-6 py-4 whitespace-nowrap">
                                                <div class="flex items-center">
                                                    <div class="h-10 w-10 rounded-lg bg-gradient-to-tr from-primary to-accent p-0.5 shadow-sm mr-3 flex-shrink-0">
                                                        <div class="h-full w-full rounded-[6px] bg-white flex items-center justify-center text-primary font-bold text-xs" x-text="getInitials(user.name)"></div>
                                                    </div>
                                                    <div>
                                                        <div class="text-sm font-bold text-gray-800" x-text="user.name"></div>
                                                        <span class="inline-flex items-center px-2 py-0.5 rounded-md text-[10px] font-bold border" 
                                                              :class="user.role === 'admin' ? 'bg-purple-50 text-purple-700 border-purple-200' : 'bg-blue-50 text-blue-700 border-blue-200'" 
                                                              x-text="user.role === 'admin' ? 'Admin' : 'Pelanggan'">
                                                        </span>
                                                    </div>
                                                </div>
                                            </td>
                                            <!-- Contact Details -->
                                            <td class="px-6 py-4 whitespace-nowrap">
                                                <div class="text-sm text-gray-800 font-medium" x-text="user.email"></div>
                                                <div class="text-xs text-gray-400" x-text="user.phone || '-'"></div>
                                            </td>
                                            <!-- Skin Type -->
                                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-650 capitalize" x-text="translateSkinType(user.skin_type)"></td>
                                            <!-- Skin Concerns -->
                                            <td class="px-6 py-4">
                                                <div class="flex flex-wrap gap-1 max-w-xs">
                                                    <template x-for="concern in (user.skin_concerns || [])" :key="concern">
                                                        <span class="inline-flex items-center px-1.5 py-0.5 rounded-md text-[10px] font-bold bg-gray-50 text-gray-500 border border-gray-205 capitalize" x-text="translateConcern(concern)"></span>
                                                    </template>
                                                    <template x-if="!user.skin_concerns || user.skin_concerns.length === 0">
                                                        <span class="text-xs text-gray-400 italic">-</span>
                                                    </template>
                                                </div>
                                            </td>
                                            <!-- Status -->
                                            <td class="px-6 py-4 whitespace-nowrap text-sm">
                                                <span class="inline-flex items-center px-2.5 py-1 rounded-lg text-xs font-bold border" 
                                                      :class="user.status === 'active' ? 'bg-green-500/10 text-green-700 border-green-500/20' : 'bg-red-500/10 text-red-700 border-red-500/20'" 
                                                      x-text="user.status === 'active' ? 'Aktif' : 'Ditangguhkan'">
                                                </span>
                                            </td>
                                            <!-- Action Button -->
                                            <td class="px-6 py-4 whitespace-nowrap text-right text-sm">
                                                <template x-if="user.role !== 'admin'">
                                                    <button @click="toggleUser(user)" 
                                                            class="inline-flex items-center px-3 py-1.5 text-xs font-bold rounded-lg border transition duration-200" 
                                                            :class="user.status === 'active' ? 'border-red-100 text-red-600 bg-red-50 hover:bg-red-600 hover:text-white' : 'border-green-100 text-green-600 bg-green-50 hover:bg-green-600 hover:text-white'"
                                                            x-text="user.status === 'active' ? 'Tangguhkan' : 'Aktifkan'">
                                                    </button>
                                                </template>
                                                <template x-if="user.role === 'admin'">
                                                    <span class="text-xs text-gray-400 italic">Tidak ada aksi</span>
                                                </template>
                                            </td>
                                        </tr>
                                    </template>
                                    <template x-if="filteredUsers.length === 0">
                                        <tr>
                                            <td colspan="6" class="px-6 py-8 text-center text-sm text-gray-400 italic">User tidak ditemukan.</td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        function adminUsersPage() {
            return {
                users: [],
                searchQuery: '',
                roleFilter: 'all',
                statusFilter: 'all',
                alertSuccess: '',
                init() {
                    this.loadUsers();
                },
                loadUsers() {
                    this.users = window.db.getUsers();
                },
                getInitials(name) {
                    if (!name) return 'U';
                    const parts = name.split(' ');
                    return parts.map(p => p.charAt(0)).slice(0, 2).join('').toUpperCase();
                },
                translateSkinType(type) {
                    if (!type) return '-';
                    const map = {
                        'dry': 'Kering',
                        'oily': 'Berminyak',
                        'combination': 'Kombinasi',
                        'normal': 'Normal',
                        'sensitive': 'Sensitif',
                        'all': 'Semua Tipe'
                    };
                    return map[type] || type;
                },
                translateConcern(concern) {
                    const map = {
                        'brightening': 'Mencerahkan',
                        'hydrating': 'Menghidrasi',
                        'acne': 'Jerawat',
                        'pore': 'Pori-pori',
                        'anti_aging': 'Anti-Aging'
                    };
                    return map[concern] || concern;
                },
                get filteredUsers() {
                    return this.users.filter(u => {
                        const matchesSearch = u.name.toLowerCase().includes(this.searchQuery.toLowerCase()) || 
                                              u.email.toLowerCase().includes(this.searchQuery.toLowerCase());
                        const matchesRole = this.roleFilter === 'all' ? true : u.role === this.roleFilter;
                        const matchesStatus = this.statusFilter === 'all' ? true : u.status === this.statusFilter;
                        return matchesSearch && matchesRole && matchesStatus;
                    });
                },
                toggleUser(user) {
                    const action = user.status === 'active' ? 'menangguhkan' : 'mengaktifkan';
                    if (confirm(`Apakah Anda yakin ingin ${action} user "${user.name}"?`)) {
                        const res = window.db.toggleUserStatus(user.id);
                        if (res.success) {
                            this.alertSuccess = `User "${user.name}" berhasil ${user.status === 'active' ? 'ditangguhkan' : 'diaktifkan'}.`;
                            this.loadUsers();
                            setTimeout(() => this.alertSuccess = '', 3000);
                        }
                    }
                }
            }
        }
    </script>
</body>
</html>
