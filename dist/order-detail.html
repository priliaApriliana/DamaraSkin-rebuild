<!DOCTYPE html>
<html lang="id" class="h-full">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Detail Pesanan - DamaraSkin</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/module.esm.js"></script>
  <script type="module" crossorigin src="/assets/compiled-BzHA8mA3.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/compiled-DXAZJh9h.css">
</head>
<body class="font-poppins antialiased bg-[#FAF7F6] text-dark-text min-h-screen flex flex-col selection:bg-primary/20 selection:text-primary">
    <!-- Navbar Container -->
    <div id="navbar-container"></div>

    <!-- Page Header Banner -->
    <div class="bg-gradient-to-r from-[#FFF6F6] via-[#FFF1F3] to-[#FFF9FA] border-b border-primary/5 py-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <!-- Breadcrumbs -->
            <nav class="flex mb-4 text-xs font-medium text-gray-400" aria-label="Breadcrumb">
                <ol class="inline-flex items-center space-x-1 md:space-x-2">
                    <li class="inline-flex items-center">
                        <a href="/" class="inline-flex items-center hover:text-primary transition">Home</a>
                    </li>
                    <li>
                        <div class="flex items-center">
                            <svg class="w-3 h-3 text-gray-300 mx-1" aria-hidden="true" fill="none" viewBox="0 0 6 10"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 9 4-4-4-4"/></svg>
                            <a href="/orders.html" class="ml-1 hover:text-primary transition">Riwayat Transaksi</a>
                        </div>
                    </li>
                    <li aria-current="page">
                        <div class="flex items-center">
                            <svg class="w-3 h-3 text-gray-300 mx-1" aria-hidden="true" fill="none" viewBox="0 0 6 10"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 9 4-4-4-4"/></svg>
                            <span class="ml-1 text-gray-550 font-semibold">Detail Pesanan</span>
                        </div>
                    </li>
                </ol>
            </nav>

            <template x-if="order">
                <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-6">
                    <div>
                        <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight leading-none" x-text="'Pesanan #' + order.order_number"></h1>
                        <p class="text-sm text-gray-500 mt-2" x-text="'Dipesan pada ' + new Date(order.created_at).toLocaleDateString('id-ID', {day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'})"></p>
                    </div>

                    <!-- Status Badges -->
                    <div class="flex flex-wrap gap-2.5">
                        <span class="inline-flex items-center px-4 py-2 rounded-full text-xs font-bold bg-white text-gray-700 border border-gray-200 shadow-sm">
                            Status: <strong class="ml-1 text-gray-800" x-text="order.status.charAt(0).toUpperCase() + order.status.slice(1)"></strong>
                        </span>
                        <span class="inline-flex items-center px-4 py-2 rounded-full text-xs font-bold shadow-sm" :class="order.payment_status === 'paid' ? 'bg-green-50 text-green-700 border border-green-200' : 'bg-yellow-50 text-yellow-700 border border-yellow-200'" x-text="'Pembayaran: ' + (order.payment_status.charAt(0).toUpperCase() + order.payment_status.slice(1))"></span>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <!-- Main Content Area -->
    <main class="py-12 bg-white" x-data="orderDetailPage()">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <template x-if="order">
                <div class="lg:grid lg:grid-cols-12 lg:gap-10">
                    <!-- Left: Order Items list (8 cols) -->
                    <div class="lg:col-span-8 mb-8 lg:mb-0">
                        <h2 class="text-lg font-bold text-gray-800 border-b border-gray-100 pb-3 mb-6">Item yang Dipesan</h2>
                        
                        <div class="space-y-6">
                            <template x-for="item in orderItems" :key="item.id">
                                <div class="flex items-center flex-col sm:flex-row pb-6 border-b border-gray-100 last:border-0 last:pb-0 gap-4">
                                    <!-- Thumbnail -->
                                    <div class="h-16 w-16 flex-shrink-0 overflow-hidden rounded-2xl border border-gray-100 bg-gray-50 shadow-sm">
                                        <img :src="item.product.images[0]" :alt="item.product.name" class="h-full w-full object-cover">
                                    </div>

                                    <!-- Product Info -->
                                    <div class="flex-grow text-center sm:text-left">
                                        <h3 class="text-sm font-semibold text-gray-800">
                                            <a :href="'/product-detail.html?slug=' + item.product.slug" class="hover:text-primary transition" x-text="item.product.name"></a>
                                        </h3>
                                        <p class="text-xs text-gray-400 mt-1 capitalize" x-text="item.product.category"></p>
                                    </div>

                                    <!-- Qty & Price -->
                                    <div class="text-center sm:text-right w-24 flex-shrink-0">
                                        <span class="text-xs text-gray-400 font-bold uppercase tracking-wider block">Harga</span>
                                        <span class="text-sm font-bold text-gray-700" x-text="formatPrice(item.price)"></span>
                                    </div>

                                    <div class="text-center sm:text-right w-16 flex-shrink-0">
                                        <span class="text-xs text-gray-400 font-bold uppercase tracking-wider block">Jumlah</span>
                                        <span class="text-sm font-bold text-gray-700" x-text="item.quantity"></span>
                                    </div>

                                    <!-- Subtotal -->
                                    <div class="text-center sm:text-right w-24 flex-shrink-0">
                                        <span class="text-xs text-gray-400 font-bold uppercase tracking-wider block">Total</span>
                                        <span class="text-sm font-bold text-primary" x-text="formatPrice(item.price * item.quantity)"></span>
                                    </div>

                                    <!-- Write Review Link -->
                                    <template x-if="order.status === 'delivered'">
                                        <div class="flex-shrink-0">
                                            <template x-if="!item.hasReviewed">
                                                <a :href="'/product-detail.html?slug=' + item.product.slug + '#review-section'" class="inline-flex px-4 py-2 bg-primary text-white text-xs font-bold rounded-full hover:bg-accent transition shadow-sm">
                                                    Beri Ulasan
                                                </a>
                                            </template>
                                            <template x-if="item.hasReviewed">
                                                <span class="text-xs text-green-500 font-semibold italic flex items-center">&#10004; Sudah diulas</span>
                                            </template>
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </div>

                    <!-- Right: Delivery & Payment Details (4 cols) -->
                    <div class="lg:col-span-4 space-y-6">
                        <!-- Delivery Info Card -->
                        <div class="bg-[#FAF7F6] p-6 sm:p-8 rounded-3xl border border-primary/5">
                            <h2 class="text-base font-bold text-gray-800 border-b border-primary/10 pb-3 mb-4">Informasi Pengiriman</h2>
                            
                            <div class="space-y-4 text-sm text-gray-600">
                                <div>
                                    <span class="text-xs font-bold text-gray-400 block uppercase tracking-wider">Penerima</span>
                                    <span class="font-bold text-gray-800" x-text="order.recipient_name"></span>
                                </div>
                                <div>
                                    <span class="text-xs font-bold text-gray-400 block uppercase tracking-wider">Nomor Telepon</span>
                                    <span class="text-gray-750 font-medium" x-text="order.recipient_phone"></span>
                                </div>
                                <div>
                                    <span class="text-xs font-bold text-gray-400 block uppercase tracking-wider">Alamat</span>
                                    <span class="text-gray-750 leading-relaxed block font-medium" x-text="order.shipping_address"></span>
                                </div>
                                <template x-if="order.notes">
                                    <div>
                                        <span class="text-xs font-bold text-gray-400 block uppercase tracking-wider">Catatan Kurir</span>
                                        <span class="text-gray-750 italic font-medium" x-text="'&ldquo;' + order.notes + '&rdquo;'"></span>
                                    </div>
                                </template>
                            </div>
                        </div>

                        <!-- Tracking details -->
                        <template x-if="order.status === 'shipped' || order.status === 'delivered'">
                            <div class="bg-[#FFF5F6] border border-primary/10 p-6 rounded-3xl text-sm text-gray-700">
                                <h2 class="text-base font-bold text-primary border-b border-primary/10 pb-3 mb-4">Status Pengiriman</h2>
                                <div>
                                    <span class="text-xs font-bold text-gray-400 block uppercase tracking-wider">Nomor Resi / Tracking</span>
                                    <span class="font-extrabold text-gray-800 text-lg tracking-wider block mt-1" x-text="order.tracking_number || 'Sedang Disiapkan'"></span>
                                </div>
                                <p class="text-xs text-gray-500 mt-3 leading-relaxed font-medium">&#128230; Paket Anda sedang dalam perjalanan oleh kurir. Anda dapat mengecek status pengiriman di website ekspedisi menggunakan nomor resi di atas.</p>
                            </div>
                        </template>

                        <!-- Pricing Summary Card -->
                        <div class="bg-[#FAF7F6] p-6 sm:p-8 rounded-3xl border border-primary/5">
                            <h2 class="text-base font-bold text-gray-800 border-b border-primary/10 pb-3 mb-5">Rincian Pembayaran</h2>
                            
                            <div class="space-y-4 text-sm">
                                <div class="flex justify-between">
                                    <span class="text-gray-500 font-medium">Subtotal Belanja</span>
                                    <span class="font-bold text-gray-800" x-text="formatPrice(order.total_price - order.shipping_cost)"></span>
                                </div>
                                <div class="flex justify-between">
                                    <span class="text-gray-500 font-medium">Ongkos Kirim</span>
                                    <span class="font-bold text-gray-800" x-text="formatPrice(order.shipping_cost)"></span>
                                </div>
                                
                                <hr class="border-gray-250">
                                
                                <div class="flex justify-between text-base font-bold">
                                    <span class="text-gray-800">Total Transaksi</span>
                                    <span class="text-primary text-lg font-extrabold" x-text="formatPrice(order.total_price)"></span>
                                </div>
                                <div class="flex justify-between text-xs pt-2">
                                    <span class="text-gray-500 font-medium">Metode</span>
                                    <span class="font-bold text-gray-700 capitalize" x-text="order.payment_method.replace('_', ' ')"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
            
            <div class="mt-8 border-t border-gray-100 pt-6">
                <a href="/orders.html" class="inline-flex items-center text-sm font-bold text-primary hover:text-accent transition">
                    &larr; Kembali ke Riwayat Transaksi
                </a>
            </div>
        </div>
    </main>

    <!-- Footer Container -->
    <div id="footer-container"></div>

    <script>
        function orderDetailPage() {
            return {
                order: null,
                orderItems: [],
                init() {
                    const params = new URLSearchParams(window.location.search);
                    const id = params.get('id');
                    if (!id) {
                        window.location.href = '/orders.html';
                        return;
                    }
                    this.order = window.db.getOrderById(id);
                    if (!this.order) {
                        window.location.href = '/orders.html';
                        return;
                    }
                    
                    // Populate items with full product info and review status
                    const reviews = window.db.getReviews();
                    this.orderItems = this.order.items.map(item => {
                        const product = window.db.getProductById(item.product_id);
                        const hasReviewed = reviews.some(r => r.product_id === item.product_id && r.user_name === this.order.recipient_name);
                        return {
                            ...item,
                            product,
                            hasReviewed
                        };
                    });
                }
            }
        }
    </script>
</body>
</html>
