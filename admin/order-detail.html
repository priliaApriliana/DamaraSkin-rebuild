<!DOCTYPE html>
<html lang="id" class="h-full bg-gray-50">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Detail Pesanan - DamaraSkin Admin</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script type="module" src="/src/js/app.js"></script>
    <link rel="stylesheet" href="/src/css/compiled.css">
</head>
<body class="font-poppins antialiased text-gray-800 h-full selection:bg-primary/20 selection:text-primary" x-data="{ sidebarOpen: false }">
    <div class="min-h-full flex">
        
        <!-- Sidebar Container -->
        <div id="admin-sidebar-container"></div>

        <!-- Page wrapper -->
        <div class="md:pl-64 flex flex-col flex-1 w-0">
            <!-- Mobile header -->
            <div class="sticky top-0 z-10 md:hidden pl-1 pt-1 sm:pl-3 sm:pt-3 bg-white border-b border-gray-200 flex items-center h-16">
                <button @click="sidebarOpen = true" class="-ml-0.5 -mt-0.5 h-12 w-12 inline-flex items-center justify-center rounded-xl text-gray-500 hover:text-gray-900 focus:outline-none">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
                </button>
                <div class="ml-4 flex items-center gap-2">
                    <img src="/images/logo.png" alt="DamaraSkin Logo" class="h-8 w-auto">
                    <span class="font-brush text-2xl text-primary font-bold">DamaraSkin Admin</span>
                </div>
            </div>

            <main class="flex-grow py-6 px-4 sm:px-6 lg:px-8" x-data="adminOrderDetailPage()">
                <div class="max-w-7xl mx-auto">
                    
                    <template x-if="order">
                        <div>
                            <div class="mb-8 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-6 border-b border-gray-150 pb-5">
                                <div>
                                    <h1 class="text-2xl font-bold text-gray-800" x-text="'Pesanan #' + order.order_number"></h1>
                                    <p class="text-xs text-gray-500 mt-1" x-text="'Dipesan pada ' + new Date(order.created_at).toLocaleDateString('id-ID', {day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'})"></p>
                                </div>
                                <a href="/admin/orders.html" class="text-xs font-bold text-primary hover:text-accent transition">&larr; Kembali ke Daftar</a>
                            </div>

                            <div class="lg:grid lg:grid-cols-12 lg:gap-10 items-start">
                                <!-- Left: Details (8 cols) -->
                                <div class="lg:col-span-8 space-y-6">
                                    <div class="bg-white p-6 rounded-2xl border border-gray-200/80 shadow-[0_4px_20px_-4px_rgba(0,0,0,0.02)]">
                                        <h2 class="text-base font-bold text-gray-800 border-b border-gray-100 pb-3 mb-5">Daftar Produk</h2>
                                        <div class="space-y-5">
                                            <template x-for="item in orderItems" :key="item.id">
                                                <div class="flex items-center justify-between pb-4 border-b border-gray-100 last:border-0 last:pb-0 gap-4">
                                                    <div class="h-12 w-12 rounded-lg overflow-hidden border border-gray-150 bg-gray-50 flex-shrink-0 shadow-sm">
                                                        <img :src="item.product.images[0]" class="h-full w-full object-cover">
                                                    </div>
                                                    <div class="flex-grow">
                                                        <p class="text-sm font-bold text-gray-800" x-text="item.product.name"></p>
                                                        <p class="text-xs text-gray-400 capitalize" x-text="item.product.category"></p>
                                                    </div>
                                                    <div class="text-right w-24 text-sm font-semibold text-gray-600" x-text="formatPrice(item.price) + ' x ' + item.quantity"></div>
                                                    <div class="text-right w-24 text-sm font-bold text-primary" x-text="formatPrice(item.price * item.quantity)"></div>
                                                </div>
                                            </template>
                                        </div>
                                    </div>

                                    <!-- Recipient info -->
                                    <div class="bg-white p-6 rounded-2xl border border-gray-200/80 shadow-[0_4px_20px_-4px_rgba(0,0,0,0.02)]">
                                        <h2 class="text-base font-bold text-gray-800 border-b border-gray-100 pb-3 mb-5">Detail Penerima</h2>
                                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 text-sm text-gray-600">
                                            <div>
                                                <span class="text-xs font-bold text-gray-400 block uppercase tracking-wider mb-1">Nama</span>
                                                <span class="font-bold text-gray-800" x-text="order.recipient_name"></span>
                                            </div>
                                            <div>
                                                <span class="text-xs font-bold text-gray-400 block uppercase tracking-wider mb-1">Telepon</span>
                                                <span class="font-semibold text-gray-800" x-text="order.recipient_phone"></span>
                                            </div>
                                            <div class="sm:col-span-2">
                                                <span class="text-xs font-bold text-gray-400 block uppercase tracking-wider mb-1">Alamat</span>
                                                <span class="font-medium text-gray-700 leading-relaxed block" x-text="order.shipping_address"></span>
                                            </div>
                                            <template x-if="order.notes">
                                                <div class="sm:col-span-2">
                                                    <span class="text-xs font-bold text-gray-400 block uppercase tracking-wider mb-1">Catatan Kurir</span>
                                                    <span class="font-medium text-gray-750 italic block" x-text="'&ldquo;' + order.notes + '&rdquo;'"></span>
                                                </div>
                                            </template>
                                        </div>
                                    </div>
                                </div>

                                <!-- Right: Status Actions (4 cols) -->
                                <div class="lg:col-span-4 space-y-6">
                                    <div class="bg-white p-6 rounded-2xl border border-gray-200/80 shadow-[0_4px_20px_-4px_rgba(0,0,0,0.02)]">
                                        <h2 class="text-base font-bold text-gray-800 border-b border-gray-100 pb-3 mb-5">Status Transaksi</h2>
                                        
                                        <div class="space-y-4">
                                            <div>
                                                <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Ubah Status</label>
                                                <select :value="order.status" @change="updateStatus($event.target.value)" class="block w-full px-4 py-2.5 bg-white border border-gray-200/80 focus:border-primary focus:ring-4 focus:ring-primary/10 rounded-xl text-sm text-gray-700 font-bold transition duration-200">
                                                    <option value="pending">Pending</option>
                                                    <option value="confirmed">Confirmed</option>
                                                    <option value="processing">Processing</option>
                                                    <option value="shipped">Shipped</option>
                                                    <option value="delivered">Delivered</option>
                                                    <option value="cancelled">Cancelled</option>
                                                </select>
                                            </div>

                                            <div>
                                                <span class="text-xs font-bold text-gray-400 block uppercase tracking-wider mb-1">Pembayaran</span>
                                                <span class="inline-flex items-center px-2.5 py-1 rounded-lg text-xs font-bold border" :class="order.payment_status === 'paid' ? 'bg-green-500/10 text-green-700 border-green-500/20' : 'bg-yellow-500/10 text-yellow-750 border-yellow-500/20'" x-text="order.payment_status.charAt(0).toUpperCase() + order.payment_status.slice(1)"></span>
                                            </div>

                                            <template x-if="order.tracking_number">
                                                <div>
                                                    <span class="text-xs font-bold text-gray-400 block uppercase tracking-wider mb-1">Nomor Resi</span>
                                                    <span class="font-extrabold text-gray-800 text-base tracking-wider block" x-text="order.tracking_number"></span>
                                                </div>
                                            </template>
                                        </div>
                                    </div>

                                    <!-- Pricing Summary Card -->
                                    <div class="bg-white p-6 rounded-2xl border border-gray-200/80 shadow-[0_4px_20px_-4px_rgba(0,0,0,0.02)]">
                                        <h2 class="text-base font-bold text-gray-800 border-b border-gray-100 pb-3 mb-5">Rincian Pembayaran</h2>
                                        
                                        <div class="space-y-4 text-sm">
                                            <div class="flex justify-between">
                                                <span class="text-gray-500 font-medium">Subtotal Belanja</span>
                                                <span class="font-bold text-gray-800" x-text="formatPrice(order.total_price - order.shipping_cost)"></span>
                                            </div>
                                            <div class="flex justify-between">
                                                <span class="text-gray-500 font-medium">Ongkos Kirim</span>
                                                <span class="font-bold text-gray-800" x-text="formatPrice(order.shipping_cost)"></span>
                                            </div>
                                            <hr class="border-gray-100">
                                            <div class="flex justify-between text-base font-bold">
                                                <span class="text-gray-800">Total Transaksi</span>
                                                <span class="text-primary text-lg font-extrabold" x-text="formatPrice(order.total_price)"></span>
                                            </div>
                                            <div class="flex justify-between text-xs pt-1">
                                                <span class="text-gray-500 font-medium">Metode</span>
                                                <span class="font-bold text-gray-700 capitalize" x-text="order.payment_method.replace('_', ' ')"></span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </template>

                </div>
            </main>
        </div>
    </div>

    <script>
        function adminOrderDetailPage() {
            return {
                order: null,
                orderItems: [],
                init() {
                    const params = new URLSearchParams(window.location.search);
                    const id = params.get('id');
                    if (!id) {
                        window.location.href = '/admin/orders.html';
                        return;
                    }
                    this.loadOrder(id);
                },
                loadOrder(id) {
                    this.order = window.db.getOrderById(id);
                    if (!this.order) {
                        window.location.href = '/admin/orders.html';
                        return;
                    }
                    this.orderItems = this.order.items.map(item => {
                        const product = window.db.getProductById(item.product_id);
                        return {
                            ...item,
                            product
                        };
                    });
                },
                updateStatus(newStatus) {
                    const res = window.db.updateOrderStatus(this.order.id, newStatus);
                    if (res.success) {
                        this.loadOrder(this.order.id);
                    }
                }
            }
        }
    </script>
</body>
</html>
