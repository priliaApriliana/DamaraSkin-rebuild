<!DOCTYPE html>
<html lang="id" class="h-full bg-gray-50">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kelola Pesanan - DamaraSkin Admin</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script type="module" src="/src/js/app.js"></script>
    <link rel="stylesheet" href="/src/css/compiled.css">
</head>
<body class="font-poppins antialiased text-gray-800 h-full selection:bg-primary/20 selection:text-primary" x-data="{ sidebarOpen: false }">
    <div class="min-h-full flex">
        
        <!-- Sidebar Container -->
        <div id="admin-sidebar-container"></div>

        <!-- Page wrapper -->
        <div class="md:pl-64 flex flex-col flex-1 w-0">
            <!-- Mobile header -->
            <div class="sticky top-0 z-10 md:hidden pl-1 pt-1 sm:pl-3 sm:pt-3 bg-white border-b border-gray-200 flex items-center h-16">
                <button @click="sidebarOpen = true" class="-ml-0.5 -mt-0.5 h-12 w-12 inline-flex items-center justify-center rounded-xl text-gray-500 hover:text-gray-900 focus:outline-none">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
                </button>
                <div class="ml-4 flex items-center gap-2">
                    <img src="/images/logo.png" alt="DamaraSkin Logo" class="h-8 w-auto">
                    <span class="font-brush text-2xl text-primary font-bold">DamaraSkin Admin</span>
                </div>
            </div>

            <main class="flex-grow py-6 px-4 sm:px-6 lg:px-8" x-data="adminOrdersPage()">
                <div class="max-w-7xl mx-auto">
                    <div class="mb-8">
                        <h1 class="text-2xl font-bold text-gray-800">Kelola Pesanan</h1>
                        <p class="text-xs text-gray-500 mt-1">Daftar semua transaksi pembelian skincare yang dilakukan oleh pelanggan.</p>
                    </div>

                    <!-- Orders Table -->
                    <div class="bg-white rounded-2xl border border-gray-200/80 shadow-[0_4px_20px_-4px_rgba(0,0,0,0.02)] overflow-hidden">
                        <div class="overflow-x-auto">
                            <table class="min-w-full divide-y divide-gray-100">
                                <thead class="bg-gray-50/50">
                                    <tr>
                                        <th class="px-6 py-3.5 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Nomor Pesanan</th>
                                        <th class="px-6 py-3.5 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Pelanggan</th>
                                        <th class="px-6 py-3.5 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Tanggal</th>
                                        <th class="px-6 py-3.5 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Total Transaksi</th>
                                        <th class="px-6 py-3.5 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Pembayaran</th>
                                        <th class="px-6 py-3.5 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Status Pesanan</th>
                                        <th class="px-6 py-3.5 text-right text-xs font-semibold text-gray-500 uppercase tracking-wider">Aksi</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-gray-100">
                                    <template x-for="order in orders" :key="order.id">
                                        <tr class="hover:bg-gray-50/60 transition duration-150">
                                            <td class="px-6 py-4 whitespace-nowrap text-sm font-bold text-gray-800" x-text="order.order_number"></td>
                                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600" x-text="order.recipient_name"></td>
                                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-400" x-text="new Date(order.created_at).toLocaleDateString('id-ID', {day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'})"></td>
                                            <td class="px-6 py-4 whitespace-nowrap text-sm font-bold text-primary" x-text="formatPrice(order.total_price)"></td>
                                            <td class="px-6 py-4 whitespace-nowrap text-sm">
                                                <span class="inline-flex items-center px-2.5 py-1 rounded-lg text-xs font-bold border" :class="order.payment_status === 'paid' ? 'bg-green-500/10 text-green-700 border-green-500/20' : 'bg-yellow-500/10 text-yellow-750 border-yellow-500/20'" x-text="order.payment_status.charAt(0).toUpperCase() + order.payment_status.slice(1)"></span>
                                            </td>
                                            <td class="px-6 py-4 whitespace-nowrap text-sm">
                                                <!-- Dropdown to update status directly -->
                                                <select :value="order.status" @change="updateStatus(order.id, $event.target.value)" class="text-xs border border-gray-200/80 rounded-xl px-2.5 py-1.5 focus:border-primary focus:ring-4 focus:ring-primary/10 font-bold text-gray-700 bg-white transition duration-200">
                                                    <option value="pending">Pending</option>
                                                    <option value="confirmed">Confirmed</option>
                                                    <option value="processing">Processing</option>
                                                    <option value="shipped">Shipped</option>
                                                    <option value="delivered">Delivered</option>
                                                    <option value="cancelled">Cancelled</option>
                                                </select>
                                            </td>
                                            <td class="px-6 py-4 whitespace-nowrap text-right text-sm">
                                                <a :href="'/admin/order-detail.html?id=' + order.id" class="inline-flex items-center px-3 py-1.5 border border-primary/20 text-xs font-bold text-primary bg-primary/5 hover:bg-primary hover:text-white rounded-xl transition duration-200">Detail</a>
                                            </td>
                                        </tr>
                                    </template>
                                    <template x-if="orders.length === 0">
                                        <tr>
                                            <td colspan="7" class="px-6 py-8 text-center text-sm text-gray-400 italic">Belum ada pesanan masuk.</td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        function adminOrdersPage() {
            return {
                orders: [],
                init() {
                    this.loadOrders();
                },
                loadOrders() {
                    this.orders = window.db.getAllOrders();
                },
                updateStatus(orderId, newStatus) {
                    const res = window.db.updateOrderStatus(orderId, newStatus);
                    if (res.success) {
                        this.loadOrders();
                    }
                }
            }
        }
    </script>
</body>
</html>
