<!DOCTYPE html>
<html lang="id" class="h-full">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tips & Edukasi Skincare - DamaraSkin</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <script type="module" src="/src/js/app.js"></script>
    <link rel="stylesheet" href="/src/css/compiled.css">
</head>
<body class="font-poppins antialiased bg-[#FAF7F6] text-dark-text min-h-screen flex flex-col selection:bg-primary/20 selection:text-primary">
    <!-- Navbar Container -->
    <div id="navbar-container"></div>

    <!-- Page Header Banner -->
    <div class="bg-gradient-to-r from-[#FFF6F6] via-[#FFF1F3] to-[#FFF9FA] border-b border-primary/5 py-12 sm:py-16">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <!-- Breadcrumbs -->
            <nav class="flex mb-4 text-xs font-medium text-gray-400" aria-label="Breadcrumb">
                <ol class="inline-flex items-center space-x-1 md:space-x-2">
                    <li class="inline-flex items-center">
                        <a href="/" class="inline-flex items-center hover:text-primary transition">Home</a>
                    </li>
                    <li aria-current="page">
                        <div class="flex items-center">
                            <svg class="w-3 h-3 text-gray-300 mx-1" aria-hidden="true" fill="none" viewBox="0 0 6 10"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 9 4-4-4-4"/></svg>
                            <span class="ml-1 text-gray-500 font-semibold">Tips & Artikel</span>
                        </div>
                    </li>
                </ol>
            </nav>

            <h1 class="text-3xl sm:text-4xl font-normal text-gray-900 tracking-tight leading-none">
                Tips &amp; <span class="italic text-primary font-medium">Edukasi Skincare</span>
            </h1>
            <p class="text-sm text-gray-505 mt-2">Ketahui jenis kulit Anda secara ilmiah, baca riset bahan aktif skincare, dan pelajari cara terbaik mendapatkan kulit impian Anda.</p>
        </div>
    </div>

    <!-- Blog Archive Main Area -->
    <div class="py-12 bg-white" x-data="articlesPage()">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            
            <!-- Skeleton Loader Grid -->
            <div x-show="loading" class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12">
                <template x-for="i in [1, 2, 3, 4, 5, 6]">
                    <div class="bg-white rounded-3xl overflow-hidden shadow-[0_10px_35px_-10px_rgba(245,128,157,0.05)] flex flex-col h-full animate-pulse">
                        <div class="relative pt-[56.25%] bg-gray-200"></div>
                        <div class="p-5 flex-grow flex flex-col space-y-4">
                            <div class="h-3 bg-gray-200 rounded w-1/4"></div>
                            <div class="h-5 bg-gray-200 rounded w-3/4"></div>
                            <div class="h-10 bg-gray-200 rounded w-full"></div>
                            <div class="h-3 bg-gray-200 rounded w-1/3 mt-auto self-end"></div>
                        </div>
                    </div>
                </template>
            </div>

            <div x-show="!loading && articles.length === 0" class="text-center py-16 bg-[#FFF9FA] rounded-3xl border border-primary/5 max-w-xl mx-auto" x-cloak>
                <p class="text-sm text-gray-500 italic">Saat ini belum ada artikel kecantikan yang dapat ditampilkan.</p>
            </div>

            <div x-show="!loading && articles.length > 0" x-cloak>
                <!-- Grid of Articles -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12">
                    <template x-for="article in articles" :key="article.id">
                        <div class="bg-white rounded-3xl overflow-hidden shadow-[0_10px_35px_-10px_rgba(245,128,157,0.05)] hover:shadow-[0_20px_40px_-10px_rgba(245,128,157,0.12)] hover:-translate-y-1.5 transform transition-all duration-500 flex flex-col h-full group">
                            <!-- Thumbnail -->
                            <div class="relative pt-[56.25%] overflow-hidden bg-gray-100">
                                <img :src="article.jetpack_featured_media_url" :alt="article.title.rendered" class="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                                <span class="absolute top-3 left-3 bg-primary text-white text-xs font-semibold px-3 py-1 rounded-full shadow-md">
                                    Skincare Tips
                                </span>
                            </div>

                            <!-- Content -->
                            <div class="p-5 flex flex-col flex-grow">
                                <div class="flex items-center space-x-1.5 text-xs text-gray-400 mb-2">
                                    <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                                    <span x-text="new Date(article.date).toLocaleDateString('id-ID', {day: 'numeric', month: 'short', year: 'numeric'})"></span>
                                </div>

                                <h3 class="text-gray-800 font-semibold text-lg mb-2 line-clamp-2 group-hover:text-primary transition-colors duration-200 leading-snug" x-html="article.title.rendered"></h3>

                                <p class="text-xs text-gray-555 line-clamp-3 mb-5 leading-relaxed flex-grow" x-text="article.excerpt.rendered.replace(/<[^>]*>/g, '').substring(0, 100) + '...'"></p>

                                <div class="mt-auto pt-3 border-t border-gray-55 flex justify-end">
                                    <a :href="'/article-detail.html?slug=' + article.slug" class="inline-flex items-center text-xs font-semibold text-primary group-hover:text-accent transition duration-200">
                                        <span>Baca Selengkapnya</span>
                                        <svg class="h-3.5 w-3.5 ml-1 transform group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer Container -->
    <div id="footer-container"></div>

    <script>
        function articlesPage() {
            return {
                articles: [],
                loading: true,
                async init() {
                    try {
                        this.articles = await window.db.getArticles();
                    } catch (e) {
                        console.error(e);
                    } finally {
                        this.loading = false;
                    }
                }
            }
        }
    </script>
</body>
</html>
